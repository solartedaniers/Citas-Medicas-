<nav style="background-color: #1e40af;" class="text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(255,255,255,0.2)">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
          </svg>
        </div>
        <span class="text-lg font-bold text-white">MediCitas</span>
      </div>

      <!-- Usuario y logout -->
      <div class="flex items-center gap-4">
        @if (usuario) {
          <div class="hidden sm:flex flex-col items-end">
            <span class="text-sm font-semibold text-white">{{ usuario.nombre }}</span>
            <span class="text-xs" style="color:rgba(255,255,255,0.7)">{{ rolLabel }}</span>
          </div>
          <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm text-white"
            style="background:rgba(255,255,255,0.25)">
            {{ usuario.nombre.charAt(0).toUpperCase() }}
          </div>
        }
        <button (click)="logout()"
          class="flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors text-white"
          style="background:rgba(255,255,255,0.15)"
          onmouseover="this.style.background='rgba(255,255,255,0.25)'"
          onmouseout="this.style.background='rgba(255,255,255,0.15)'">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
          </svg>
          <span class="hidden sm:inline">Cerrar sesión</span>
        </button>
      </div>

    </div>
  </div>
</nav>
