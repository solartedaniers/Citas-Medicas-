<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 p-4">

  <div class="flex w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden">

    <!-- Panel izquierdo -->
    <div class="hidden md:flex flex-col items-center justify-center w-2/5 bg-white/10 backdrop-blur-md px-10 py-16 text-white relative overflow-hidden">
      <div class="absolute -top-16 -left-16 w-64 h-64 rounded-full bg-white/5"></div>
      <div class="absolute -bottom-20 -right-10 w-80 h-80 rounded-full bg-white/5"></div>

      <div class="relative z-10 mb-8 w-20 h-20 rounded-2xl bg-white/15 flex items-center justify-center">
        <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
        </svg>
      </div>

      <h1 class="relative z-10 text-3xl font-bold text-center mb-3">MediCitas</h1>
      <p class="relative z-10 text-white/70 text-sm text-center leading-relaxed">
        Plataforma de gestión de citas médicas para pacientes y profesionales de salud.
      </p>

      <div class="relative z-10 mt-10 grid grid-cols-2 gap-3 w-full">
        <div class="bg-white/10 rounded-xl p-3 text-center">
          <p class="text-2xl font-bold">24/7</p>
          <p class="text-xs text-white/60 mt-0.5">Disponibilidad</p>
        </div>
        <div class="bg-white/10 rounded-xl p-3 text-center">
          <p class="text-2xl font-bold">100%</p>
          <p class="text-xs text-white/60 mt-0.5">Seguro</p>
        </div>
      </div>
    </div>

    <!-- Panel derecho -->
    <div class="flex flex-col justify-center w-full md:w-3/5 bg-white px-8 md:px-12 py-12">

      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900 mb-1">Bienvenido</h2>
        <p class="text-sm text-slate-500">Ingresa tus credenciales para continuar</p>
      </div>

      @if (errorMessage) {
        <div class="mb-5 flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
          <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate class="space-y-5">

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Correo electrónico</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3.5 flex items-center text-slate-400">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
              </svg>
            </span>
            <input id="correo" name="correo" type="email"
              [(ngModel)]="credentials.correo" required
              placeholder="doctor@hospital.com"
              class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"/>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Contraseña</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3.5 flex items-center text-slate-400">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </span>
            <input id="contrasena" name="contrasena"
              [type]="mostrarPassword ? 'text' : 'password'"
              [(ngModel)]="credentials.contrasena" required
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"/>
            <button type="button" (click)="mostrarPassword = !mostrarPassword"
              class="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
            <input type="checkbox" name="recordarme" [(ngModel)]="credentials.recordarme"
              class="h-4 w-4 rounded border-slate-300"/>
            Recordarme
          </label>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || loading"
          class="w-full py-3 bg-blue-700 hover:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-xl transition-colors duration-200 text-sm flex items-center justify-center gap-2">
          @if (loading) {
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Ingresando...
          } @else {
            Iniciar sesión
          }
        </button>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500">
          ¿Eres nuevo paciente?
          <a routerLink="/registro" class="text-blue-700 font-semibold hover:underline ml-1">Crear cuenta</a>
        </p>
      </div>

    </div>
  </div>
</div>
