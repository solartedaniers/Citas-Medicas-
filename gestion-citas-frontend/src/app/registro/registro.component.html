<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 via-primary-800 to-primary-700 p-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl px-8 py-10">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-100 mb-4">
        <svg class="w-7 h-7 text-primary-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"/>
        </svg>
      </div>
      <h2 class="font-display text-2xl font-bold text-slate-900">Crear cuenta</h2>
      <p class="text-sm text-slate-500 mt-1">Regístrate como paciente para agendar citas</p>
    </div>

    <!-- Error -->
    @if (errorMessage) {
      <div class="mb-5 flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
        <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" #regForm="ngForm" novalidate class="space-y-4">

      <!-- Nombre -->
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nombre completo</label>
        <input name="nombre" type="text" [(ngModel)]="form.nombre" required
          placeholder="Juan Pérez"
          class="input-field"/>
      </div>

      <!-- Correo -->
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Correo electrónico</label>
        <input name="correo" type="email" [(ngModel)]="form.correo" required
          placeholder="juan@ejemplo.com"
          class="input-field"/>
      </div>

      <!-- Teléfono -->
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Teléfono (opcional)</label>
        <input name="telefono" type="tel" [(ngModel)]="form.telefono"
          placeholder="+57 300 000 0000"
          class="input-field"/>
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Contraseña</label>
        <div class="relative">
          <input name="contrasena"
            [type]="mostrarPassword ? 'text' : 'password'"
            [(ngModel)]="form.contrasena" required minlength="6"
            placeholder="Mínimo 6 caracteres"
            class="input-field pr-10"/>
          <button type="button" (click)="mostrarPassword = !mostrarPassword"
            class="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Botón -->
      <button type="submit" [disabled]="regForm.invalid || loading" class="btn-primary w-full py-3 mt-2">
        @if (loading) {
          <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Creando cuenta...
        } @else {
          Crear cuenta
        }
      </button>

    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-primary-700 font-semibold hover:underline ml-1">Iniciar sesión</a>
    </p>

  </div>
</div>
